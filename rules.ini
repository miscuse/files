[custom]
exclude_remarks=(?i)Traffic|Expire|频道|订阅|ISP|流量|到期|重置

ruleset=DIRECT,[]DOMAIN-SUFFIX,makima.online
ruleset=DIRECT,[]PROCESS-NAME,aria2c
ruleset=DIRECT,[]DOMAIN-SUFFIX,codeforces.com
ruleset=media,[]GEOSITE,bahamut
ruleset=JP,[]GEOSITE,gitlab
ruleset=AI,[]GEOSITE,openai
ruleset=media,[]GEOSITE,onedrive
ruleset=media,[]GEOSITE,microsoft
ruleset=DIRECT,[]GEOSITE,steam@cn
ruleset=DIRECT,[]GEOSITE,netlify
ruleset=DIRECT,[]GEOSITE,CN
ruleset=DIRECT,[]GEOIP,CN
ruleset=DIRECT,[]GEOIP,lan
ruleset=proxy,[]MATCH

custom_proxy_group=proxy`fallback`[]download`[]HK`[]TW`[]SG`[]JP`[]US`.*`http://www.gstatic.com/generate_204`300
custom_proxy_group=HK`url-test`(?i)香港|hk|hongkong|hong kong`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=TW`url-test`(?i)台湾|tw|taiwan`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=JP`url-test`(?i)日本|jp|japan`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=SG`url-test`(?i)新加坡|狮城|sg|singapore`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=US`url-test`(?i)美国|[^ar]us|unitedstates|united states`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=media`select`[]HK`[]TW`[]SG`[]JP`[]US`[]download`.*
custom_proxy_group=AI`select`[]HK`[]TW`[]SG`[]JP`[]US`[]download`.*
custom_proxy_group=download`url-test`(0.\d)`[]REJECT`http://www.gstatic.com/generate_204`300,,50

enable_rule_generator=true
overwrite_original_rules=true
